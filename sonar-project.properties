sonar.projectKey=ESLINT
sonar.projectName=ESLINT
sonar.projectVersion=1.0

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Include JS and TS files
sonar.inclusions=**/*.js,**/*.ts,**/*.jsx,**/*.tsx

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,gen/**/*,**/*.java

# ESLint report - this is the correct property name for your SonarQube version
sonar.javascript.eslint.reportPaths=eslint-report.json
sonar.issue.tags=eslint